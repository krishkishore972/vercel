name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: build-server
  API_IMAGE: vercel-api-server
  S3_REVERSE_PROXY_IMAGE: vercel-s3-reverse-proxy

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.filter.outputs.api-server }}
      s3-reverse-proxy: ${{ steps.filter.outputs.s3-reverse-proxy }}
      build-server: ${{ steps.filter.outputs.build-server }}
      cicd: ${{ steps.filter.outputs.cicd }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-server:
              - 'api-server/**'
            s3-reverse-proxy:
              - 's3-reverse-proxy/**'
            build-server:
              - 'build-server/**'
            cicd:
              - '.github/workflows/**'
              - 'docker-compose.prod.yml'

  validate-api-server:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api-server == 'true' ||
      needs.changes.outputs.cicd == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API Server Docker image
        run: docker build -t api-server-test ./api-server

  push-api-server:
    needs:
      - changes
      - validate-api-server
    if: |
      (github.event_name == 'push' && needs.changes.outputs.api-server == 'true') ||
      (github.event_name == 'push' && needs.changes.outputs.cicd == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Server Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./api-server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-s3-reverse-proxy:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.s3-reverse-proxy == 'true' ||
      needs.changes.outputs.cicd == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build S3 Reverse Proxy Docker image
        run: docker build -t s3-reverse-proxy-test ./s3-reverse-proxy

  push-s3-reverse-proxy:
    needs:
      - changes
      - validate-s3-reverse-proxy
    if: |
      (github.event_name == 'push' && needs.changes.outputs.s3-reverse-proxy == 'true') ||
      (github.event_name == 'push' && needs.changes.outputs.cicd == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push S3 Reverse Proxy Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./s3-reverse-proxy
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.S3_REVERSE_PROXY_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.S3_REVERSE_PROXY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-build-server:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.build-server == 'true' ||
      needs.changes.outputs.cicd == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Build Server Docker image
        run: docker build -t build-server-test ./build-server

  push-build-server:
    needs:
      - changes
      - validate-build-server
    if: |
      (github.event_name == 'push' && needs.changes.outputs.build-server == 'true') ||
      (github.event_name == 'push' && needs.changes.outputs.cicd == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Build Server Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./build-server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    needs:
      - changes
      - push-api-server
      - push-s3-reverse-proxy
    if: |
      always() &&
      (
        needs.push-api-server.result == 'success' ||
        needs.push-api-server.result == 'skipped'
      ) &&
      (
        needs.push-s3-reverse-proxy.result == 'success' ||
        needs.push-s3-reverse-proxy.result == 'skipped'
      ) &&
      (
        (github.event_name == 'push' && needs.changes.outputs.api-server == 'true') ||
        (github.event_name == 'push' && needs.changes.outputs.s3-reverse-proxy == 'true') ||
        (github.event_name == 'push' && needs.changes.outputs.cicd == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy API and reverse proxy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.PRODUCTION_APP_DIR || '/opt/vercel-clone' }}"
            git pull --ff-only
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            docker compose -f docker-compose.prod.yml pull api-server s3-reverse-proxy
            docker compose -f docker-compose.prod.yml up -d api-server s3-reverse-proxy
            docker image prune -f
