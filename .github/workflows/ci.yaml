name: CI

on:
  push:
    branches:
      - main

  pull_request:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: build-server

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      api-server: ${{ steps.filter.outputs.api-server }}
      s3-reverse-proxy: ${{ steps.filter.outputs.s3-reverse-proxy }}
      build-server: ${{ steps.filter.outputs.build-server }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter

        with:
          filters: |
            api-server:
              - 'api-server/**'

            s3-reverse-proxy:
              - 's3-reverse-proxy/**'

            build-server:
              - 'build-server/**'

  validate-api-server:
    needs: changes

    if: needs.changes.outputs.api-server == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API Server Docker Image
        run: docker build -t api-server-test ./api-server

  validate-s3-reverse-proxy:
    needs: changes

    if: needs.changes.outputs.s3-reverse-proxy == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build S3 Reverse Proxy Docker Image
        run: docker build -t s3-reverse-proxy-test ./s3-reverse-proxy

  validate-build-server:
    needs: changes

    if: needs.changes.outputs.build-server == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Build Server Docker Image
        run: docker build -t build-server-test ./build-server

  push-build-server:
    needs:
      - changes
      - validate-build-server

    if: needs.changes.outputs.build-server == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        uses: docker/build-push-action@v6

        with:
          context: ./build-server
          push: true

          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max